<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia — Agendamento Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0e0e0e;
    --dark2: #181818;
    --dark3: #222;
    --border: rgba(201,168,76,0.25);
    --text: #f0ede6;
    --muted: #888;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 0 1.25rem 4rem; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 3.5rem 1rem 2.5rem;
    position: relative;
  }
  .hero-line {
    width: 48px; height: 2px;
    background: var(--gold);
    margin: 0 auto .75rem;
  }
  .hero-tag {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: .75rem;
    font-weight: 300;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 14vw, 5.5rem);
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(160deg, #fff 30%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .5rem;
  }
  .hero-sub {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 1.25rem;
  }
  .badge-hours {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--gold-light);
    letter-spacing: 1px;
  }
  .dot-green {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3ecf6a;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{ box-shadow: 0 0 0 0 rgba(62,207,106,.4); }
    50%{ box-shadow: 0 0 0 5px rgba(62,207,106,0); }
  }

  /* STEPS */
  .steps-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 2rem;
  }
  .step-seg {
    flex: 1; height: 3px;
    border-radius: 2px;
    background: var(--dark3);
    transition: background .3s;
  }
  .step-seg.active { background: var(--gold); }

  /* SECTION */
  .section-lbl {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: .5rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  /* SERVICES */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.75rem;
  }
  .svc-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1rem;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .svc-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,.07) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .2s;
  }
  .svc-card:hover { border-color: rgba(201,168,76,.5); transform: translateY(-1px); }
  .svc-card:hover::after { opacity: 1; }
  .svc-card.sel {
    border-color: var(--gold);
    background: rgba(201,168,76,.08);
  }
  .svc-card.sel::after { opacity: 1; }
  .svc-icon { font-size: 1.5rem; margin-bottom: .5rem; }
  .svc-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .svc-price { font-size: 13px; color: var(--gold); font-weight: 400; }
  .svc-check {
    position: absolute;
    top: 10px; right: 10px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #000;
    font-weight: 700;
  }
  .svc-card.sel .svc-check { display: flex; }

  /* DAYS */
  .days-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 1.5rem;
    scrollbar-width: none;
  }
  .days-scroll::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0;
    width: 62px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .65rem .25rem;
    text-align: center;
    background: var(--dark2);
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .day-btn:hover { border-color: rgba(201,168,76,.5); }
  .day-btn.sel { border-color: var(--gold); background: rgba(201,168,76,.08); }
  .day-dow { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 3px; }
  .day-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text); line-height: 1; }
  .day-mon { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .day-btn.sel .day-dow, .day-btn.sel .day-mon { color: var(--gold-light); }
  .day-btn.sel .day-num { color: var(--gold); }

  /* SLOTS */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px,1fr));
    gap: 8px;
    margin-bottom: 1.75rem;
  }
  .slot-btn {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .6rem .25rem;
    text-align: center;
    background: var(--dark2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    transition: border-color .2s, background .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .slot-btn:hover:not(:disabled) { border-color: rgba(201,168,76,.5); }
  .slot-btn.sel { border-color: var(--gold); background: rgba(201,168,76,.08); color: var(--gold); }
  .slot-btn:disabled {
    background: transparent;
    color: #333;
    border-color: #1f1f1f;
    cursor: not-allowed;
    text-decoration: line-through;
  }

  /* FORM */
  .form-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .sum-item {
    background: rgba(201,168,76,.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem .75rem;
  }
  .sum-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .sum-val { font-size: 14px; font-weight: 500; color: var(--gold-light); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .7rem 1rem;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: #333; }
  .err-msg { font-size: 12px; color: #e24b4a; margin-top: 5px; }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--gold) 0%, #a87c2a 100%);
    color: #000;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .2s, transform .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .3; cursor: not-allowed; }
  .btn-ghost {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0;
    margin-bottom: 1.25rem;
    font-family: 'DM Sans', sans-serif;
    transition: color .15s;
  }
  .btn-ghost:hover { color: var(--text); }

  /* SUCCESS */
  .success-wrap {
    text-align: center;
    padding: 2.5rem 1rem;
  }
  .success-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(62,207,106,.1);
    border: 1px solid rgba(62,207,106,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.25rem;
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    margin-bottom: .5rem;
    color: var(--text);
  }
  .success-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
  .btn-wpp {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: .9rem 2rem;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .2s;
    margin-bottom: 1rem;
  }
  .btn-wpp:hover { opacity: .88; }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 12px;
    color: #333;
    letter-spacing: 1px;
    padding-top: 1rem;
  }

  /* FADE IN */
  .fade-in { animation: fadein .35s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-line"></div>
    <div class="hero-tag">Agendamento Online</div>
    <h1>BARBEARIA</h1>
    <div class="hero-sub">Cortes & Estilo</div>
    <div class="badge-hours">
      <div class="dot-green"></div>
      Seg–Sáb &nbsp;·&nbsp; 9h às 19h
    </div>
  </div>

  <!-- APP -->
  <div id="app"></div>

  <div class="footer">Agendamentos direto no WhatsApp do barbeiro</div>
</div>

<script>
const PHONE = '5592992217362';
const SERVICES = [
  { id:'cabelo', name:'Corte de cabelo', price:'R$ 30', icon:'✂️' },
  { id:'barba',  name:'Barba',           price:'R$ 25', icon:'🪒' },
  { id:'combo',  name:'Corte + Barba',   price:'R$ 50', icon:'💈' },
  { id:'sobrancelha', name:'Sobrancelha', price:'R$ 15', icon:'⬛' },
];
const HOURS = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
const BUSY  = ['10:00','13:00'];

let S = { step:1, svc:null, day:null, slot:null, name:'', phone:'', errs:{} };

function getDays(){
  const labels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const days=[]; const now=new Date();
  for(let i=0;i<8;i++){
    const d=new Date(now); d.setDate(now.getDate()+i);
    if(d.getDay()===0) continue;
    days.push({
      dow: labels[d.getDay()],
      num: d.getDate(),
      mon: months[d.getMonth()],
      full: d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})
    });
    if(days.length>=6) break;
  }
  return days;
}

function render(){
  const app = document.getElementById('app');
  if(S.step===4){ app.innerHTML = renderSuccess(); bindSuccess(); return; }
  app.innerHTML = `
    <div class="steps-bar">
      ${[1,2,3].map(n=>`<div class="step-seg ${S.step>=n?'active':''}"></div>`).join('')}
    </div>
    <div class="fade-in">
      ${S.step===1 ? step1() : S.step===2 ? step2() : step3()}
    </div>
  `;
  bind();
}

function step1(){
  return `
    <div class="section-lbl">Passo 1 de 3</div>
    <div class="section-title">ESCOLHA O SERVIÇO</div>
    <div class="services-grid">
      ${SERVICES.map(sv=>`
        <button class="svc-card ${S.svc===sv.id?'sel':''}" data-svc="${sv.id}" type="button">
          <div class="svc-check">✓</div>
          <div class="svc-icon">${sv.icon}</div>
          <div class="svc-name">${sv.name}</div>
          <div class="svc-price">${sv.price}</div>
        </button>
      `).join('')}
    </div>
    <button class="btn-primary" id="btn1" ${!S.svc?'disabled':''} type="button">
      Próximo &rarr;
    </button>
  `;
}

function step2(){
  const days = getDays();
  return `
    <button class="btn-ghost" id="btnBack" type="button">&#8592; Voltar</button>
    <div class="section-lbl">Passo 2 de 3</div>
    <div class="section-title">DATA E HORÁRIO</div>
    <div class="days-scroll">
      ${days.map((d,i)=>`
        <button class="day-btn ${S.day===i?'sel':''}" data-day="${i}" type="button">
          <div class="day-dow">${d.dow}</div>
          <div class="day-num">${d.num}</div>
          <div class="day-mon">${d.mon}</div>
        </button>
      `).join('')}
    </div>
    <div class="section-lbl" style="margin-bottom:.75rem">Horários disponíveis</div>
    <div class="slots-grid">
      ${HOURS.map(h=>`
        <button class="slot-btn ${BUSY.includes(h)?'':''}${S.slot===h&&!BUSY.includes(h)?' sel':''}"
          data-slot="${h}" ${BUSY.includes(h)?'disabled':''} type="button">${h}</button>
      `).join('')}
    </div>
    <button class="btn-primary" id="btn2" ${S.day===null||!S.slot?'disabled':''} type="button">
      Próximo &rarr;
    </button>
  `;
}

function step3(){
  const days = getDays();
  const svc  = SERVICES.find(s=>s.id===S.svc);
  const day  = days[S.day];
  return `
    <button class="btn-ghost" id="btnBack" type="button">&#8592; Voltar</button>
    <div class="section-lbl">Passo 3 de 3</div>
    <div class="section-title">SEUS DADOS</div>
    <div class="form-card">
      <div class="summary-grid">
        <div class="sum-item"><div class="sum-lbl">Serviço</div><div class="sum-val">${svc?svc.name:''}</div></div>
        <div class="sum-item"><div class="sum-lbl">Valor</div><div class="sum-val">${svc?svc.price:''}</div></div>
        <div class="sum-item"><div class="sum-lbl">Data</div><div class="sum-val">${day?day.dow+', '+day.num+'/'+day.mon:''}</div></div>
        <div class="sum-item"><div class="sum-lbl">Horário</div><div class="sum-val">${S.slot}</div></div>
      </div>
      <hr class="divider" style="margin:0 0 1.25rem">
      <div class="field">
        <label for="fname">Seu nome completo</label>
        <input type="text" id="fname" placeholder="Ex: João Silva" value="${S.name}" autocomplete="name">
        ${S.errs.name?`<div class="err-msg">${S.errs.name}</div>`:''}
      </div>
      <div class="field">
        <label for="fphone">WhatsApp com DDD</label>
        <input type="tel" id="fphone" placeholder="Ex: 92 99999-9999" value="${S.phone}" autocomplete="tel">
        ${S.errs.phone?`<div class="err-msg">${S.errs.phone}</div>`:''}
      </div>
    </div>
    <button class="btn-primary" id="btn3" type="button">
      ✔ Confirmar pelo WhatsApp
    </button>
  `;
}

function renderSuccess(){
  const days = getDays();
  const svc  = SERVICES.find(s=>s.id===S.svc);
  const day  = days[S.day];
  const msg  = encodeURIComponent(
    `Olá! Quero agendar um horário:\n\n`+
    `👤 Nome: ${S.name}\n`+
    `📱 WhatsApp: ${S.phone}\n`+
    `✂️ Serviço: ${svc.name} (${svc.price})\n`+
    `📅 Data: ${day.full}\n`+
    `⏰ Horário: ${S.slot}\n\n`+
    `Aguardo confirmação! 🙏`
  );
  const url = `https://wa.me/${PHONE}?text=${msg}`;
  return `
    <div class="success-wrap fade-in">
      <div class="success-circle">✅</div>
      <div class="section-title" style="color:#3ecf6a">PRONTO!</div>
      <div class="success-sub">
        Seu agendamento foi preparado.<br>
        Clique abaixo para enviar direto no WhatsApp do barbeiro e aguarde a confirmação!
      </div>
      <a href="${url}" target="_blank" class="btn-wpp">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L.057 23.5l5.797-1.52A11.928 11.928 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.884a9.87 9.87 0 01-5.031-1.379l-.361-.214-3.741.981.998-3.648-.235-.374A9.861 9.861 0 012.116 12C2.116 6.579 6.579 2.116 12 2.116c5.42 0 9.884 4.463 9.884 9.884 0 5.42-4.464 9.884-9.884 9.884z"/>
        </svg>
        Enviar agendamento
      </a>
      <br>
      <button class="btn-ghost" style="margin:0 auto" id="btnReset" type="button">&#8635; Fazer novo agendamento</button>
    </div>
  `;
}

function bind(){
  document.querySelectorAll('[data-svc]').forEach(btn=>{
    btn.onclick = () => { S.svc = btn.dataset.svc; render(); };
  });
  document.querySelectorAll('[data-day]').forEach(btn=>{
    btn.onclick = () => { S.day = parseInt(btn.dataset.day); render(); };
  });
  document.querySelectorAll('[data-slot]').forEach(btn=>{
    btn.onclick = () => { if(!btn.disabled){ S.slot = btn.dataset.slot; render(); } };
  });
  const b1 = document.getElementById('btn1');
  if(b1) b1.onclick = () => { S.step=2; render(); };
  const b2 = document.getElementById('btn2');
  if(b2) b2.onclick = () => { S.step=3; render(); };
  const b3 = document.getElementById('btn3');
  if(b3) b3.onclick = () => {
    const nm = document.getElementById('fname').value.trim();
    const ph = document.getElementById('fphone').value.trim();
    S.name=nm; S.phone=ph; S.errs={};
    if(!nm) S.errs.name = 'Por favor, informe seu nome.';
    if(!ph) S.errs.phone = 'Por favor, informe seu WhatsApp com DDD.';
    if(Object.keys(S.errs).length){ render(); return; }
    S.step=4; render();
  };
  document.querySelectorAll('#btnBack').forEach(b=>{
    b.onclick = () => { S.step=Math.max(1,S.step-1); render(); };
  });
  const fname = document.getElementById('fname');
  if(fname) fname.oninput = e => { S.name=e.target.value; };
  const fphone = document.getElementById('fphone');
  if(fphone) fphone.oninput = e => { S.phone=e.target.value; };
}

  const r = document.getElementById('btnReset');
